[pytest]
# MobileAutoQA pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for selective runs
markers =
    sanity: core sanity suite (smoke tests)
    regression: full regression suite
    jira: per-JIRA-ticket generated tests
    android: Android-only test
    ios: iOS-only test

# Output
addopts =
    -v
    --tb=short
    --strict-markers

# Retry flaky tests once (BrowserStack sessions can be flaky)
# (requires pytest-rerunfailures)
# addopts += --reruns 1 --reruns-delay 3
