# ─── MobileAutoQA — Base Configuration ────────────────────────────────────────
# Committed to source control. Secrets live in secrets.yaml (gitignored).
# Override any value with env vars: MAQA_<SECTION>_<KEY> (e.g. MAQA_BROWSERSTACK_ENABLED)

# Platform: android | ios
platform: android

# Run mode: browserstack | local
run_mode: local

# Environment: qa | prod | nrspurple | prod_nrspurple  (selects credentials block below)
# Switched to `prod_nrspurple` — Play Store NRS Purple PROD app sanity on connected OnePlus
environment: prod_nrspurple

# ─── App Identifiers (from UzioMobile repo) ───────────────────────────────────
# Active build: base UZIO (com.uzioapp) — APK already installed & running on
# OnePlus CPH2707 (transport_id:10) for PHIX-98315 defect verification.
# (NRS Purple variant kept commented for switch-back.)
app:
  android:
    # package: com.uzioapp
    package: com.uzioapp.nrspurple    # NRS Purple PROD (Play Store install)
    activity: com.uzioapp.MainActivity
    # bs:// URL from BrowserStack upload, or local .apk path
    browserstack_app: "bs://0b933294e6851f303bd916e832572ccf2106fed8"  # NRS Purple 12.4.4.3 build 1806 · custom_id UZIO_NRSPURPLE — Nirnay review fixes (LoginContentHelper.tsx, AboutUs.tsx)
    # browserstack_app: "bs://6bba9b275c18350bb27e40f7db2ea1c689004420" # PROD UZIO 22-05-2026 (legacy)
    # browserstack_app: "bs://a13b87912807793599027a95b2fe051f9b0203ef" # TA UZIO 21-05-2026 (legacy)
    apk_path: ""                # mobile_apk/12.4.4.3_1606_android_nrspurple_build.apk (local mode)
  ios:
    bundle_id: com.uzioapp.nrspurple
    browserstack_app: "bs://523471b8b6f90231c6781277bb24408a3e99e37a"  # NRS Purple iOS 12.4.4.3 · custom_id UZIO_NRSPURPLE_IOS
    ipa_path: ""                # mobile_apk/12.4.4.3_ios_nrspurple_build.ipa (local mode)

# ─── Local Appium server ──────────────────────────────────────────────────────
appium:
  server_url: http://localhost:4723
  android_device: "4ce254ab"    # ADB serial of the user's connected phone
  ios_device: ""                # iOS UDID — blank = first available simulator

# ─── BrowserStack App Automate ────────────────────────────────────────────────
browserstack:
  enabled: false   # local OnePlus run for PHIX-98315 — flip back on for BS runs
  hub: https://hub-cloud.browserstack.com/wd/hub
  # username / access_key go in secrets.yaml
  project: UZIO Mobile
  build: NRS Purple PHIX-86688 16-06-2026
  android:
    device: Samsung Galaxy S23
    os_version: "13.0"
  ios:
    device: iPhone 15
    os_version: "17.0"
  # HEALED 2026-05-23: account is on BrowserStack Free plan — networkLogs/deviceLogs
  # are paid-only and cause "NEW_SESSION" to fail. Disabled to allow session creation.
  debug: true
  network_logs: false
  device_logs: false
  video: true
  interactive_debugging: true

# ─── Timeouts (seconds) ───────────────────────────────────────────────────────
timeouts:
  default: 30
  login: 45              # SSO/login can be slow
  clock_state: 90        # clocked-in/out confirmation
  implicit: 5

# ─── Credentials (per environment) ────────────────────────────────────────────
# Passwords go in secrets.yaml — usernames here are non-sensitive.
credentials:
  prod:
    employee_username: shruti.singhal1@mailinator.com
    # employee_password → secrets.yaml: credentials.prod.employee_password
  qa:
    employee_username: mobile2@t.com        # MANAGER (ER) — approves/rejects entries
    # employee_password → secrets.yaml: credentials.qa.employee_password
    ee_manual_username: mobile1@t.com       # EE for NEW MANUAL ENTRY cases (Add Time Entry)
    # ee_manual_password → secrets.yaml: credentials.qa.ee_manual_password
    ee_modify_username: mobile3@t.com       # EE for MODIFICATION cases (edit existing entry)
    # ee_modify_password → secrets.yaml: credentials.qa.ee_modify_password
    # Legacy alias kept so existing tests/fixtures that reference 'reportee' still work
    reportee_username: mobile3@t.com
    # reportee_password → secrets.yaml: credentials.qa.reportee_password
  nrspurple:                                # PHIX-86688 NRS Purple white-label build
    employee_username: ein@ch.com           # EMPLOYEE — Ein Lname (UI / sanity / E2E reportee side)
    # employee_password → secrets.yaml: credentials.nrspurple.employee_password
    manager_username: ale@ch.com            # REPORTEE-MANAGER — Bale Lname (approves Ein's requests)
    # manager_password → secrets.yaml: credentials.nrspurple.manager_password
  prod_nrspurple:                           # Live PROD NRS Purple — biometric/app-lock repro
    portal_url: https://payroll.nrspurple.com/employee
    employee_username: nrspurple.uzio.employee@outlook.com
    # employee_password → secrets.yaml: credentials.prod_nrspurple.employee_password

# ─── Reporting ────────────────────────────────────────────────────────────────
reporting:
  output_dir: reports
  screenshot_on_pass: true
  screenshot_on_fail: true
  # Google Chat + email config → secrets.yaml
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    from_addr: ""              # secrets.yaml: reporting.email.from_addr
    to_addrs: []               # ["mobile-dev-qa@uzio.com"]
    subject_prefix: "[MobileAutoQA]"
  google_chat:
    enabled: false    # disabled — re-enable when ready for team notifications
    # webhook_url → secrets.yaml: reporting.google_chat.webhook_url
